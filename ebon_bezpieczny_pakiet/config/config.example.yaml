# config.example.yaml — przykładowa konfiguracja EBON
# Skopiuj do config/config.yaml i dostosuj przed uruchomieniem.

portal:
  base_url: "https://przykladowy-portal-naboru.pl"
  login_path: "/logowanie"
  recruitment_path: "/rekrutacja"
  form_path: "/formularz"
  timeout_sec: 30

simulation:
  headless: true
  screenshot_on_each_step: true
  output_dir: "sample_output/simulate"

validation:
  required_fields:
    - imie
    - nazwisko
    - pesel
    - email
    - telefon
    - adres
    - kod_pocztowy
    - miasto
  pesel_check: true
  email_check: true

logging:
  level: "INFO"
  file: "logs/ebon.log"
